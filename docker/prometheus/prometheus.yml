global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  # Application metrics forwarded via the OTLP collector's Prometheus exporter
  - job_name: otel-collector-app-metrics
    static_configs:
      - targets: [ 'otel-collector:8889' ]

  # The collector's own internal telemetry
  - job_name: otel-collector-internal
    static_configs:
      - targets: [ 'otel-collector:8888' ]

  - job_name: prometheus
    static_configs:
      - targets: [ 'localhost:9090' ]
